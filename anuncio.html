<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anúncio Reels — Dra. Sabrina Silvério</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    min-height: 100vh; background: #111; font-family: 'Montserrat', sans-serif; gap: 20px;
  }
  canvas { border-radius: 16px; box-shadow: 0 0 80px rgba(0,0,0,0.6); height: 85vh; width: auto; }
  .controls { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
  .controls button {
    background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.25); color: #fff;
    padding: 12px 30px; border-radius: 10px; font-size: 15px; font-family: 'Montserrat', sans-serif;
    cursor: pointer; transition: background 0.2s;
  }
  .controls button:hover { background: rgba(255,255,255,0.2); }
  .controls button.primary { background: #25D366; border-color: #25D366; font-weight: 600; }
  .controls button.primary:hover { background: #1fba59; }
  .status { color: rgba(255,255,255,0.5); font-size: 13px; font-family: 'Montserrat', sans-serif; text-align: center; min-height: 20px; }
  .progress-outer { width: 360px; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; }
  .progress-inner { height: 100%; width: 0%; background: linear-gradient(90deg, #c9a87c, #8b6f5e); border-radius: 3px; transition: width 0.1s linear; }
</style>
</head>
<body>
<div class="status" id="status">Carregando imagens...</div>
<canvas id="canvas" width="1080" height="1920"></canvas>
<div class="progress-outer"><div class="progress-inner" id="progressBar"></div></div>
<div class="controls">
  <button onclick="playAnimation()">▶ Play</button>
  <button onclick="playAnimation()" id="replayBtn" style="display:none">↻ Replay</button>
  <button class="primary" onclick="exportVideo()" id="exportBtn" style="display:none">⬇ Exportar Vídeo</button>
</div>

<!-- Image data (base64 embedded) -->
<script src="img_data.js"></script>

<script>
const W = 1080, H = 1920;
const DURATION = 18;
const FPS = 30;
const ROSE = '#c9a87c', BROWN = '#8b6f5e', DARK_BG = '#0a0a0a';

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const images = {};
let imagesLoaded = 0;
const keys = Object.keys(IMAGE_DATA);

function loadImages() {
  return new Promise((resolve) => {
    for (const key of keys) {
      const img = new Image();
      img.onload = () => {
        images[key] = img;
        imagesLoaded++;
        document.getElementById('status').textContent = 'Carregando imagens... ' + imagesLoaded + '/' + keys.length;
        if (imagesLoaded === keys.length) {
          document.getElementById('status').textContent = 'Pronto! Clique em Play.';
          resolve();
        }
      };
      img.onerror = () => { console.error('Erro:', key); imagesLoaded++; if (imagesLoaded === keys.length) resolve(); };
      img.src = IMAGE_DATA[key];
    }
  });
}

// === EASING ===
function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }
function easeInOutCubic(t) { return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2, 3)/2; }
function easeOutBack(t) { const c1 = 1.70158, c3 = c1 + 1; return 1 + c3 * Math.pow(t-1,3) + c1 * Math.pow(t-1,2); }
function clamp01(t) { return Math.max(0, Math.min(1, t)); }

// === DRAW HELPERS ===
function drawImageCover(img, x, y, w, h, posY) {
  if (!img) return;
  const ir = img.width / img.height, cr = w / h;
  let sw, sh, sx, sy;
  if (ir > cr) { sh = img.height; sw = sh * cr; sx = (img.width - sw) / 2; sy = 0; }
  else { sw = img.width; sh = sw / cr; sx = 0; sy = posY ? (img.height - sh) * posY : (img.height - sh) / 2; }
  ctx.drawImage(img, sx, sy, sw, sh, x, y, w, h);
}

// Fit image without cropping — shows entire image, fills remaining space with black
function drawImageFit(img, x, y, w, h) {
  if (!img) return;
  const ir = img.width / img.height, cr = w / h;
  let dw, dh, dx, dy;
  if (ir > cr) {
    // Image is wider than area — fit to width
    dw = w; dh = w / ir; dx = x; dy = y + (h - dh) / 2;
  } else {
    // Image is taller than area — fit to height
    dh = h; dw = h * ir; dx = x + (w - dw) / 2; dy = y;
  }
  ctx.drawImage(img, 0, 0, img.width, img.height, dx, dy, dw, dh);
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath(); ctx.moveTo(x+r, y); ctx.lineTo(x+w-r, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r); ctx.lineTo(x+w, y+h-r);
  ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h); ctx.lineTo(x+r, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-r); ctx.lineTo(x, y+r);
  ctx.quadraticCurveTo(x, y, x+r, y); ctx.closePath();
}

// ============================================================
// CENA 1 — ABERTURA LOGO (0s - 3.5s)
// ============================================================
function drawScene1(t) {
  var s = 0, e = 3.5;
  if (t < s || t > e + 0.5) return;
  var fadeIn = clamp01((t - s) / 0.6), fadeOut = clamp01((e - t) / 0.5);
  var alpha = fadeIn * fadeOut;
  ctx.save(); ctx.globalAlpha = alpha;

  // Background gradient claro
  var grad = ctx.createLinearGradient(0, 0, W, H);
  grad.addColorStop(0, '#faf8f6'); grad.addColorStop(0.5, '#f0ebe5'); grad.addColorStop(1, '#e8ddd4');
  ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);

  // Sparkle particles
  for (var i = 0; i < 12; i++) {
    var px = (Math.sin(i*2.3+t*1.5)*0.3+0.5)*W;
    var py = (Math.cos(i*1.7+t*1.2)*0.35+0.5)*H;
    var sa = Math.sin(t*3+i*1.5)*0.5+0.5;
    var sz = 3+Math.sin(i+t*2)*2;
    ctx.beginPath(); ctx.arc(px, py, sz, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(201,168,124,' + (sa*0.4) + ')'; ctx.fill();
  }

  // Logo
  if (images.logo) {
    var lp = easeOutCubic(clamp01((t-s)/1));
    var ls = 300*(0.85+0.15*lp);
    ctx.globalAlpha = alpha*lp;
    ctx.drawImage(images.logo, (W-ls)/2, H*0.28-ls/2, ls, ls);
  }

  // "Resultado Natural."
  var tp = easeOutCubic(clamp01((t-s-0.6)/0.8));
  ctx.globalAlpha = alpha*tp;
  ctx.fillStyle = BROWN;
  ctx.font = '700 58px "Playfair Display", serif';
  ctx.textAlign = 'center';
  ctx.fillText('Resultado Natural.', W/2, H*0.52 + 30*(1-tp));

  // "Sem Exageros."
  var t2p = easeOutCubic(clamp01((t-s-1.0)/0.8));
  ctx.globalAlpha = alpha*t2p;
  ctx.fillText('Sem Exageros.', W/2, H*0.58 + 25*(1-t2p));

  // Subtítulo
  var sp = easeOutCubic(clamp01((t-s-1.5)/0.7));
  ctx.globalAlpha = alpha*sp;
  ctx.font = '300 26px "Montserrat", sans-serif';
  ctx.fillStyle = '#b8a090';
  ctx.fillText('H A R M O N I Z A \u00C7 \u00C3 O   F A C I A L', W/2, H*0.64);

  // Linha decorativa
  var lw = 120*sp;
  ctx.strokeStyle = ROSE; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(W/2-lw/2, H*0.67); ctx.lineTo(W/2+lw/2, H*0.67); ctx.stroke();

  ctx.restore();
}

// ============================================================
// CENA GENÉRICA ANTES/DEPOIS
// ============================================================
function drawCompareScene(t, sceneStart, sceneEnd, img, label, subtitle, imgScale) {
  imgScale = imgScale || 1.0;
  if (t < sceneStart - 0.3 || t > sceneEnd + 0.5) return;
  var fadeIn = clamp01((t-sceneStart)/0.5), fadeOut = clamp01((sceneEnd-t)/0.5);
  var alpha = fadeIn * fadeOut;
  ctx.save(); ctx.globalAlpha = alpha;

  ctx.fillStyle = DARK_BG; ctx.fillRect(0, 0, W, H);
  var imgAreaH = H - 260;

  if (img) {
    // Draw at full width, keep aspect ratio, center vertically
    var dW = W * imgScale;
    var dH = dW * (img.height / img.width);
    var dX = (W - dW) / 2;
    var dY = (imgAreaH - dH) / 2;
    ctx.drawImage(img, dX, dY, dW, dH);

    // Reveal: cortina escura saindo da esquerda pra direita
    var rp = easeInOutCubic(clamp01((t-sceneStart-0.5)/1.2));
    if (rp < 1) {
      ctx.fillStyle = DARK_BG;
      ctx.fillRect(W * rp, 0, W - (W * rp), imgAreaH);
    }

    // Linha tracejada central
    if (rp > 0.3) {
      var la = clamp01((rp-0.3)/0.3) * 0.5;
      ctx.strokeStyle = 'rgba(255,255,255,' + la + ')';
      ctx.lineWidth = 3;
      ctx.setLineDash([12, 8]);
      ctx.beginPath(); ctx.moveTo(W/2, 120); ctx.lineTo(W/2, imgAreaH-60); ctx.stroke();
      ctx.setLineDash([]);
    }
  }

  // Gradiente inferior na imagem
  var ig = ctx.createLinearGradient(0, imgAreaH-200, 0, imgAreaH);
  ig.addColorStop(0, 'rgba(0,0,0,0)'); ig.addColorStop(1, 'rgba(0,0,0,0.75)');
  ctx.fillStyle = ig; ctx.fillRect(0, imgAreaH-200, W, 200);

  // Labels ANTES / DEPOIS
  var lp2 = easeOutCubic(clamp01((t-sceneStart-1.0)/0.6));
  ctx.globalAlpha = alpha * lp2;
  ctx.font = '600 34px "Montserrat", sans-serif'; ctx.fillStyle = '#fff';
  ctx.textAlign = 'left'; ctx.fillText('ANTES', 60, imgAreaH-40);
  ctx.textAlign = 'right'; ctx.fillText('DEPOIS', W-60, imgAreaH-40);

  // Pill do procedimento (topo)
  ctx.globalAlpha = alpha;
  var pp = easeOutBack(clamp01((t-sceneStart-0.3)/0.6));
  ctx.save(); ctx.translate(W/2, 80); ctx.scale(pp, pp);
  ctx.font = '600 40px "Playfair Display", serif';
  var pw = ctx.measureText(label).width;
  roundRect(-(pw/2+40), -28, pw+80, 64, 32);
  ctx.fillStyle = 'rgba(139,111,94,0.9)'; ctx.fill();
  ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.fillText(label, 0, 12);
  ctx.restore();

  // Barra inferior com info
  ctx.globalAlpha = alpha;
  var bg = ctx.createLinearGradient(0, imgAreaH, W, H);
  bg.addColorStop(0, '#8b6f5e'); bg.addColorStop(1, '#a08674');
  ctx.fillStyle = bg; ctx.fillRect(0, imgAreaH, W, 200);

  // Logo pequena na barra
  if (images.logo) {
    ctx.save(); ctx.beginPath(); ctx.arc(100, imgAreaH+100, 50, 0, Math.PI*2);
    ctx.fillStyle = '#fff'; ctx.fill(); ctx.clip();
    ctx.drawImage(images.logo, 55, imgAreaH+55, 90, 90); ctx.restore();
  }

  // Textos na barra
  ctx.fillStyle = '#fff';
  ctx.font = '600 36px "Playfair Display", serif'; ctx.textAlign = 'left';
  ctx.fillText('Dra. Sabrina Silv\u00E9rio', 170, imgAreaH+90);
  ctx.font = '300 26px "Montserrat", sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  ctx.fillText(subtitle, 170, imgAreaH+130);

  ctx.restore();
}

// ============================================================
// CENA PROCEDIMENTOS (13.5s - 17.5s)
// ============================================================
function drawProcedimentos(t) {
  var s = 13.5, e = 17.5;
  if (t < s - 0.3 || t > e + 0.5) return;
  var fadeIn = clamp01((t-s)/0.5), fadeOut = clamp01((e-t)/0.5);
  var alpha = fadeIn * fadeOut;
  ctx.save(); ctx.globalAlpha = alpha;

  // Background gradient elegante
  var bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, '#1a1210');
  bg.addColorStop(0.5, '#2a1f1a');
  bg.addColorStop(1, '#1a1210');
  ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);

  // Título
  var titleP = easeOutCubic(clamp01((t-s-0.2)/0.6));
  ctx.globalAlpha = alpha * titleP;
  ctx.font = '700 52px "Playfair Display", serif';
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'center';
  ctx.fillText('Nossos Tratamentos', W/2, 180 + 30*(1-titleP));

  // Linha decorativa
  var lineP = easeOutCubic(clamp01((t-s-0.5)/0.4));
  var lineW = 160 * lineP;
  ctx.strokeStyle = ROSE; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(W/2-lineW/2, 220); ctx.lineTo(W/2+lineW/2, 220); ctx.stroke();

  // Lista de procedimentos
  var procedimentos = [
    {icon: '\u2728', nome: 'Harmoniza\u00E7\u00E3o Facial'},
    {icon: '\uD83D\uDC8E', nome: 'Preenchimento Labial'},
    {icon: '\u2728', nome: 'Botox'},
    {icon: '\uD83D\uDC8E', nome: 'Bioestimulador de Col\u00E1geno'},
    {icon: '\u2728', nome: 'Ultrassom Microfocado'},
    {icon: '\uD83D\uDC8E', nome: 'Rinomodela\u00E7\u00E3o'},
    {icon: '\u2728', nome: 'Fios de PDO'},
    {icon: '\uD83D\uDC8E', nome: 'Limpeza de Pele'},
  ];

  var startY = 310;
  var spacing = 150;

  for (var i = 0; i < procedimentos.length; i++) {
    var delay = 0.4 + i * 0.25;
    var itemP = easeOutCubic(clamp01((t-s-delay)/0.5));
    ctx.globalAlpha = alpha * itemP;

    var y = startY + i * spacing;
    var xOffset = 40 * (1 - itemP); // slide in from right

    // Background pill
    roundRect(80 + xOffset, y - 35, W - 160, 110, 20);
    ctx.fillStyle = 'rgba(201, 168, 124, 0.08)';
    ctx.fill();

    // Left accent bar
    roundRect(80 + xOffset, y - 35, 6, 110, 3);
    ctx.fillStyle = ROSE;
    ctx.fill();

    // Icon
    ctx.font = '36px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(procedimentos[i].icon, 120 + xOffset, y + 18);

    // Nome
    ctx.font = '500 38px "Montserrat", sans-serif';
    ctx.fillStyle = '#fff';
    ctx.fillText(procedimentos[i].nome, 180 + xOffset, y + 15);

    // Subtle line under (except last)
    if (i < procedimentos.length - 1) {
      ctx.strokeStyle = 'rgba(201,168,124,0.15)';
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(120, y + 65); ctx.lineTo(W - 120, y + 65); ctx.stroke();
    }
  }

  // Footer text
  var footP = easeOutCubic(clamp01((t-s-2.5)/0.5));
  ctx.globalAlpha = alpha * footP;
  ctx.font = '300 28px "Montserrat", sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.textAlign = 'center';
  ctx.fillText('e muito mais...', W/2, H - 180);

  // Logo bottom
  if (images.logo) {
    ctx.globalAlpha = alpha * footP * 0.6;
    ctx.drawImage(images.logo, (W-100)/2, H - 140, 100, 100);
  }

  ctx.restore();
}

// ============================================================
// CENA FINAL — CTA COM FOTO DA SABRINA (17s - 22s)
// ============================================================
function drawScene5(t) {
  var s = 13.5, e = DURATION;
  if (t < s - 0.3) return;
  var fadeIn = clamp01((t-s)/0.6);
  ctx.save(); ctx.globalAlpha = fadeIn;

  ctx.fillStyle = DARK_BG; ctx.fillRect(0, 0, W, H);

  // Foto da Sabrina com zoom lento
  if (images.sabrina) {
    var z = 1 + (t-s) * 0.008;
    ctx.save();
    ctx.translate((W - W*z)/2, (H - H*z)/2);
    ctx.scale(z, z);
    drawImageCover(images.sabrina, 0, 0, W, H, 0);
    ctx.restore();
  }

  // Gradiente escuro por cima
  var og = ctx.createLinearGradient(0, H*0.3, 0, H);
  og.addColorStop(0, 'rgba(0,0,0,0)');
  og.addColorStop(0.5, 'rgba(0,0,0,0.5)');
  og.addColorStop(1, 'rgba(0,0,0,0.92)');
  ctx.fillStyle = og; ctx.fillRect(0, 0, W, H);

  // Logo topo
  if (images.logo) {
    var la = easeOutCubic(clamp01((t-s-0.3)/0.6));
    ctx.globalAlpha = fadeIn * la;
    ctx.save();
    ctx.beginPath(); ctx.arc(W/2, 120, 55, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,255,255,0.95)'; ctx.fill(); ctx.clip();
    ctx.drawImage(images.logo, W/2-45, 75, 90, 90);
    ctx.restore();
  }

  var tY = H * 0.68;

  // Título
  var tp = easeOutCubic(clamp01((t-s-0.5)/0.8));
  ctx.globalAlpha = fadeIn * tp;
  ctx.fillStyle = '#fff';
  ctx.font = '700 72px "Playfair Display", serif'; ctx.textAlign = 'center';
  ctx.fillText('Agende sua', W/2, tY + 40*(1-tp));
  ctx.fillText('Avalia\u00E7\u00E3o Gratuita', W/2, tY + 85 + 40*(1-tp));

  // Linha decorativa
  var lnp = easeOutCubic(clamp01((t-s-1.0)/0.5));
  var lnw = 200 * lnp;
  ctx.strokeStyle = ROSE; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(W/2-lnw/2, tY+115); ctx.lineTo(W/2+lnw/2, tY+115); ctx.stroke();

  // Subtítulo
  var sp = easeOutCubic(clamp01((t-s-1.0)/0.7));
  ctx.globalAlpha = fadeIn * sp;
  ctx.font = '300 32px "Montserrat", sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.8)';
  ctx.fillText('Harmoniza\u00E7\u00E3o Facial com resultado natural', W/2, tY+165);

  // 3 tratamentos principais com transparência
  var trP = easeOutCubic(clamp01((t-s-1.3)/0.6));
  ctx.globalAlpha = fadeIn * trP * 0.55;
  ctx.font = '400 26px "Montserrat", sans-serif';
  ctx.fillStyle = '#fff'; ctx.textAlign = 'center';
  ctx.fillText('Botox  \u00B7  Preenchimento  \u00B7  Harmoniza\u00E7\u00E3o  \u00B7  Gl\u00FAteos', W/2, tY+210);

  // Botão WhatsApp
  var bp = easeOutBack(clamp01((t-s-1.5)/0.6));
  ctx.globalAlpha = fadeIn * bp;
  ctx.save(); ctx.translate(W/2, tY+260); ctx.scale(bp, bp);
  ctx.shadowColor = 'rgba(37,211,102,0.5)'; ctx.shadowBlur = 40;
  roundRect(-220, -40, 440, 80, 40);
  ctx.fillStyle = '#25D366'; ctx.fill(); ctx.shadowBlur = 0;
  ctx.fillStyle = '#fff';
  ctx.font = '600 34px "Montserrat", sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('\uD83D\uDCF2  WhatsApp', 0, 12);
  ctx.restore();

  // Pulse
  if (bp >= 1) {
    var pulse = Math.sin((t-s-2.1)*4)*0.03+1;
    ctx.save(); ctx.translate(W/2, tY+260); ctx.scale(pulse, pulse);
    ctx.globalAlpha = fadeIn * 0.15;
    roundRect(-230, -50, 460, 100, 50);
    ctx.fillStyle = '#25D366'; ctx.fill();
    ctx.restore();
  }

  // Localização
  var locp = easeOutCubic(clamp01((t-s-2.0)/0.5));
  ctx.globalAlpha = fadeIn * locp;
  ctx.font = '400 28px "Montserrat", sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.6)'; ctx.textAlign = 'center';
  ctx.fillText('\uD83D\uDCCD Taquaral, Campinas', W/2, tY+350);

  // Credenciais
  var cp = easeOutCubic(clamp01((t-s-2.3)/0.5));
  ctx.globalAlpha = fadeIn * cp;
  ctx.font = '300 24px "Montserrat", sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.45)';
  ctx.fillText('Prof\u00AA de P\u00F3s-Gradua\u00E7\u00E3o em Harmoniza\u00E7\u00E3o Facial', W/2, tY+400);

  ctx.restore();
}

// ============================================================
// BARRA DE PROGRESSO
// ============================================================
function drawProgressBar(t) {
  var p = t / DURATION;
  ctx.save();
  var bg = ctx.createLinearGradient(0, 0, W*p, 0);
  bg.addColorStop(0, ROSE); bg.addColorStop(1, BROWN);
  ctx.fillStyle = bg;
  roundRect(0, 0, W*p, 6, 3); ctx.fill();
  ctx.restore();
}

// ============================================================
// RENDER
// ============================================================
function renderFrame(t) {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = DARK_BG; ctx.fillRect(0, 0, W, H);

  drawScene1(t);
  drawCompareScene(t, 3, 7, images.harm1, 'Harmoniza\u00E7\u00E3o Facial', 'Prof\u00AA de P\u00F3s-Gradua\u00E7\u00E3o');
  drawCompareScene(t, 6.5, 10.5, images.rino, 'Rejuvenescimento Facial', 'Especialista em Est\u00E9tica');
  drawCompareScene(t, 10, 14, images.labial, 'Preenchimento Labial', 'Taquaral, Campinas', 0.85);
  drawScene5(t);
  drawProgressBar(t);
}

// ============================================================
// PLAYBACK
// ============================================================
var animationId = null, startTime = null;

function playAnimation() {
  if (animationId) cancelAnimationFrame(animationId);
  startTime = performance.now();
  document.getElementById('status').textContent = 'Reproduzindo...';
  document.getElementById('replayBtn').style.display = 'none';
  document.getElementById('exportBtn').style.display = 'none';

  function tick() {
    var elapsed = (performance.now() - startTime) / 1000;
    var t = Math.min(elapsed, DURATION);
    renderFrame(t);
    document.getElementById('progressBar').style.width = (t/DURATION*100) + '%';
    if (elapsed < DURATION) {
      animationId = requestAnimationFrame(tick);
    } else {
      document.getElementById('status').textContent = 'Finalizado! Exporte ou clique Replay.';
      document.getElementById('replayBtn').style.display = 'inline-block';
      document.getElementById('exportBtn').style.display = 'inline-block';
      animationId = null;
    }
  }
  tick();
}

// ============================================================
// EXPORT VIDEO
// ============================================================
async function exportVideo() {
  var btn = document.getElementById('exportBtn');
  btn.textContent = '\u23F3 Exportando...'; btn.disabled = true;

  var stream = canvas.captureStream(FPS);
  var mimeType = MediaRecorder.isTypeSupported('video/webm;codecs=vp9')
    ? 'video/webm;codecs=vp9' : 'video/webm';
  var recorder = new MediaRecorder(stream, { mimeType: mimeType, videoBitsPerSecond: 8000000 });
  var chunks = [];

  recorder.ondataavailable = function(e) { if (e.data.size > 0) chunks.push(e.data); };
  recorder.onstop = function() {
    var blob = new Blob(chunks, { type: mimeType });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'anuncio-dra-sabrina-silverio.webm';
    a.click();
    URL.revokeObjectURL(url);
    btn.textContent = '\u2B07 Exportar V\u00EDdeo'; btn.disabled = false;
    document.getElementById('status').textContent = 'V\u00EDdeo exportado!';
  };

  recorder.start();
  var totalFrames = DURATION * FPS;
  for (var frame = 0; frame <= totalFrames; frame++) {
    renderFrame(frame / FPS);
    document.getElementById('progressBar').style.width = (frame/totalFrames*100) + '%';
    document.getElementById('status').textContent = 'Exportando... ' + Math.round(frame/totalFrames*100) + '%';
    await new Promise(function(r) { setTimeout(r, 1000/FPS); });
  }
  recorder.stop();
}
